name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # Autorise la création de releases et le push de tags
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour standard-version pour voir l'historique
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm install

      - name: Configuration Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Automatic Version Bump
        id: bump
        shell: pwsh
        run: |
          # Tentative d'incrémentation basée sur les commits conventionnels
          $result = npx standard-version --skip.tag
          if ($LASTEXITCODE -eq 0) {
            $package = Get-Content package.json | ConvertFrom-Json
            $version = $package.version
            echo "new_version=$version" >> $env:GITHUB_OUTPUT
            echo "should_release=true" >> $env:GITHUB_OUTPUT
            Write-Host "New version detected: $version"
          } else {
            echo "should_release=false" >> $env:GITHUB_OUTPUT
            Write-Host "No version bump needed."
          }

      - name: Sync Cargo.toml version
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.new_version }}"
          $tomlPath = "src-tauri/Cargo.toml"
          $content = Get-Content $tomlPath
          $newContent = $content -replace '^version = ".*"', "version = `"$version`""
          $newContent | Set-Content $tomlPath
          Write-Host "Cargo.toml synchronized to version $version"

      - name: Build and Release Tauri App
        if: steps.bump.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.bump.outputs.new_version }}
          releaseName: 'ExeOutput Studio v${{ steps.bump.outputs.new_version }}'
          releaseBody: 'Voir les commits pour la liste des changements.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Prepare and Deploy Update Manifest
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          Write-Host "Recherche exhaustive du manifeste..."
          # Recherche dans TOUT le dépôt pour être sûr de ne rien rater
          Get-ChildItem -Path "." -Filter "*.json" -Recurse | ForEach-Object {
            try {
              $content = Get-Content $_.FullName -Raw | ConvertFrom-Json -ErrorAction SilentlyContinue
              if ($content.version -and $content.platforms) {
                Copy-Item $_.FullName "maj.json"
                Write-Host "MANIFESTE TROUVÉ ! Chemin: $($_.FullName)"
                return
              }
            } catch { }
          }
          
          if (!(Test-Path "maj.json")) {
            Write-Error "CRITICAL: updater json not found anywhere in the workspace!"
            Write-Host "Listing all JSON files for diagnostic:"
            Get-ChildItem -Path "." -Filter "*.json" -Recurse | Select-Object FullName
            exit 1
          }

      - name: Upload to Server via SFTP
        if: steps.bump.outputs.should_release == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 5022
          source: "maj.json"
          target: "/home/sddxxzqh/public_html/"
          strip_components: 0

      - name: Push changes and tags back to GitHub
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          git push --follow-tags
