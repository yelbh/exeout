name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # Autorise la création de releases et le push de tags
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour standard-version pour voir l'historique
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm install

      - name: Configuration Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Automatic Version Bump
        id: bump
        shell: bash
        run: |
          # Tentative d'incrémentation basées sur les commits conventionnels
          if npx standard-version; then
            VERSION=$(node -p "require('./package.json').version")
            echo "new_version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync Cargo.toml version
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.new_version }}"
          $tomlPath = "src-tauri/Cargo.toml"
          $content = Get-Content $tomlPath
          $newContent = $content -replace '^version = ".*"', "version = `"$version`""
          $newContent | Set-Content $tomlPath
          Write-Host "Cargo.toml synchronized to version $version"

      - name: Build and Release Tauri App
        if: steps.bump.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.bump.outputs.new_version }}
          releaseName: 'ExeOutput Studio v${{ steps.bump.outputs.new_version }}'
          releaseBody: 'Voir les commits pour la liste des changements.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Prepare and Deploy Update Manifest
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          # Recherche récursive globale dans tout le dossier target
          Get-ChildItem -Path "src-tauri/target" -Filter "*.json" -Recurse | Where-Object { $_.Name -notmatch "package.json|Cargo.toml|manifest.json" } | ForEach-Object {
            $content = Get-Content $_.FullName | ConvertFrom-Json
            if ($content.version -and $content.platforms) {
              Copy-Item $_.FullName "maj.json"
              Write-Host "Manifest Found: $($_.FullName) -> maj.json"
              return
            }
          }
          if (!(Test-Path "maj.json")) {
            Write-Error "Error: updater json not found in target directory"
            Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.json"
            exit 1
          }

      - name: Upload to Server via SSH
        if: steps.bump.outputs.should_release == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 5022
          source: "maj.json"
          target: "/home/sddxxzqh/public_html/"
          rm: false

      - name: Push changes and tags back to GitHub
        if: steps.bump.outputs.should_release == 'true'
        shell: bash
        run: |
          git push --follow-tags
