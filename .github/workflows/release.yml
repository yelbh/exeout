name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm install

      - name: Configuration Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Automatic Version Bump
        id: bump
        shell: pwsh
        run: |
          $result = npx standard-version --skip.tag
          if ($LASTEXITCODE -eq 0) {
            $package = Get-Content package.json | ConvertFrom-Json
            $version = $package.version
            echo "new_version=$version" >> $env:GITHUB_OUTPUT
            echo "should_release=true" >> $env:GITHUB_OUTPUT
            Write-Host "New version detected: $version"
          } else {
            echo "should_release=false" >> $env:GITHUB_OUTPUT
            Write-Host "No version bump needed."
          }

      - name: Sync Cargo.toml version
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.new_version }}"
          $tomlPath = "src-tauri/Cargo.toml"
          $content = Get-Content $tomlPath
          $newContent = $content -replace '^version = ".*"', "version = `"$version`""
          $newContent | Set-Content $tomlPath
          Write-Host "Cargo.toml synchronized to version $version"

      - name: Build and Release Tauri App
        if: steps.bump.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.bump.outputs.new_version }}
          releaseName: 'ExeOutput Studio v${{ steps.bump.outputs.new_version }}'
          releaseBody: 'Voir les commits pour la liste des changements.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Prepare Update Manifest and MSI
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          Write-Host "=== Recherche du manifeste updater ==="
          $manifestFound = $false
          Get-ChildItem -Path "." -Filter "*.json" -Recurse | ForEach-Object {
            if ($manifestFound) { return }
            try {
              $content = Get-Content $_.FullName -Raw | ConvertFrom-Json -ErrorAction SilentlyContinue
              if ($content.version -and $content.platforms) {
                Copy-Item $_.FullName "exeoutput-studio.json"
                Write-Host "MANIFESTE TROUVE: $($_.FullName)"
                $manifestFound = $true
              }
            } catch { }
          }

          Write-Host "=== Recherche du MSI.zip ==="
          $zipFound = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zipFound) {
            Copy-Item $zipFound.FullName "exeoutput-studio.msi.zip"
            Write-Host "MSI.ZIP TROUVE: $($zipFound.FullName)"
          } else {
            Write-Host "AVERTISSEMENT: Aucun .msi.zip trouve."
          }

          Write-Host "=== Fichiers prepares ==="
          Get-ChildItem -Filter "exeoutput-*" | ForEach-Object { Write-Host " - $($_.Name)" }

      - name: Upload Artifacts
        if: steps.bump.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: |
            exeoutput-studio.json
            exeoutput-studio.msi.zip
          retention-days: 1

      - name: Push changes and tags back to GitHub
        if: steps.bump.outputs.should_release == 'true'
        shell: pwsh
        run: |
          git push --follow-tags

  deploy:
    needs: build
    if: needs.build.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-files

      - name: Upload to Server via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 5022
          source: "exeoutput-studio.json,exeoutput-studio.msi.zip"
          target: "/home/sddxxzqh/public_html/telechargements/"
          strip_components: 0
